<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Icons</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #F5F0E8;
    --card: #FEFCF7;
    --border: #D8CEB8;
    --text: #2C2416;
    --muted: #8A7A5E;
    --accent: #4A7C3F;
    --accent2: #8B5E3C;
    --veg: #5C8A3F;
    --herb: #7B52A0;
    --tree: #5C7A3F;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    color: var(--text);
    min-height: 100vh;
  }

  header {
    padding: 48px 40px 32px;
    border-bottom: 1.5px solid var(--border);
    background: var(--card);
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(32px, 5vw, 52px);
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 8px;
  }

  header p {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.05em;
  }

  .tabs {
    display: flex;
    gap: 0;
    padding: 24px 40px 0;
    border-bottom: 1.5px solid var(--border);
    background: var(--card);
  }

  .tab {
    padding: 12px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: none;
    border-bottom: 2.5px solid transparent;
    margin-bottom: -1.5px;
    transition: all 0.15s;
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }

  .tab[data-cat="herbs"].active { border-bottom-color: var(--herb); }
  .tab[data-cat="trees"].active { border-bottom-color: var(--tree); }

  .count {
    display: inline-block;
    margin-left: 8px;
    padding: 1px 7px;
    border-radius: 99px;
    font-size: 10px;
    background: var(--border);
    color: var(--muted);
    vertical-align: middle;
  }

  main {
    padding: 32px 40px 60px;
  }

  .section { display: none; }
  .section.active { display: block; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 20px 16px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    border-color: var(--accent);
  }

  .card svg {
    width: 64px;
    height: 64px;
  }

  .card-name {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    line-height: 1.4;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    max-width: 360px;
    width: 90%;
    text-align: center;
  }

  .modal svg { width: 120px; height: 120px; margin-bottom: 16px; }

  .modal h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    margin-bottom: 6px;
  }

  .modal p {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .modal-btns {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text);
    transition: all 0.15s;
  }

  .btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn.primary:hover { background: #3a6a30; border-color: #3a6a30; }

  .btn-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none; border: none;
    font-size: 20px; cursor: pointer;
    color: var(--muted);
  }

  .modal { position: relative; }
</style>
</head>
<body>

<header>
  <h1>Plant Icons</h1>
  <p>259 handcrafted SVG icons · vegetables · herbs · fruit trees & bushes</p>
</header>

<div class="tabs">
  <button class="tab active" data-cat="vegetables" onclick="switchTab('vegetables', this)">
    Vegetables <span class="count">176</span>
  </button>
  <button class="tab" data-cat="herbs" onclick="switchTab('herbs', this)">
    Herbs <span class="count">35</span>
  </button>
  <button class="tab" data-cat="trees" onclick="switchTab('trees', this)">
    Trees <span class="count">48</span>
  </button>
</div>

<main>
  <div class="section active" id="vegetables">
    <div class="grid" id="veg-grid"></div>
  </div>
  <div class="section" id="herbs">
    <div class="grid" id="herb-grid"></div>
  </div>
  <div class="section" id="trees">
    <div class="grid" id="tree-grid"></div>
  </div>
</main>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="btn-close" onclick="closeModal()">×</button>
    <div id="modal-icon"></div>
    <h2 id="modal-name"></h2>
    <p id="modal-cat"></p>
    <div class="modal-btns">
      <button class="btn primary" onclick="downloadSVG()">Download SVG</button>
      <button class="btn" onclick="copySVG()">Copy SVG</button>
    </div>
  </div>
</div>

const catLabels = { vegetables: 'Vegetable', herbs: 'Herb', trees: 'Tree' };

let currentIcon = null;

function formatName(n) {
  return n.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function buildGrid(cat) {
  const gridId = cat === 'vegetables' ? 'veg-grid' : cat === 'herbs' ? 'herb-grid' : 'tree-grid';
  const grid = document.getElementById(gridId);
  grid.innerHTML = '';
  categories[cat].forEach(name => {
    if (!icons[name]) return;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `${icons[name]}<div class="card-name">${formatName(name)}</div>`;
    card.onclick = () => openModal(name, cat);
    grid.appendChild(card);
  });
}

['vegetables','herbs','trees'].forEach(buildGrid);

function switchTab(cat, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(cat).classList.add('active');
}

function openModal(name, cat) {
  currentIcon = { name, cat };
  document.getElementById('modal-icon').innerHTML = icons[name];
  document.getElementById('modal-icon').querySelector('svg').style.cssText = 'width:120px;height:120px';
  document.getElementById('modal-name').textContent = formatName(name);
  document.getElementById('modal-cat').textContent = catLabels[cat];
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

function downloadSVG() {
  if (!currentIcon) return;
  const blob = new Blob([icons[currentIcon.name]], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = currentIcon.name + '.svg';
  a.click();
}

function copySVG() {
  if (!currentIcon) return;
  navigator.clipboard.writeText(icons[currentIcon.name]).then(() => {
    const btn = document.querySelector('.modal-btns .btn:last-child');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy SVG', 1500);
  });
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal({}); });
